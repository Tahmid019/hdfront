services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../hd_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../hd_backend/.env
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
